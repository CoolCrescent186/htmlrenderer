<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; width: 250px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #qrcode { margin: 20px auto; }
        #downloadBtn { display: none; background-color: #28a745; margin-top: 10px; }
        #downloadBtn:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>QR Code Generator</h2>
    <input type="text" id="urlInput" placeholder="Paste link here..." />
    <br>
    <button onclick="generateQR()">Generate</button>
    
    <div id="qrcode"></div>
    
    <button id="downloadBtn" onclick="downloadQR()">Download QR Code</button>
</div>

<script>
    let qrcodeContainer = document.getElementById("qrcode");
    let downloadBtn = document.getElementById("downloadBtn");
    let qr;

    function generateQR() {
        let url = document.getElementById("urlInput").value;
        if (!url) {
            alert("Please enter a link!");
            return;
        }

        // Clear previous QR code
        qrcodeContainer.innerHTML = "";
        
        // Generate new QR code
        qr = new QRCode(qrcodeContainer, {
            text: url,
            width: 256,
            height: 256,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // Show download button after a tiny delay to ensure image is rendered
        setTimeout(() => {
            downloadBtn.style.display = "inline-block";
        }, 300);
    }

    function downloadQR() {
        // Find the image element inside the QR container
        const img = qrcodeContainer.querySelector("img");
        if (img) {
            const link = document.createElement("a");
            link.href = img.src;
            link.download = "qrcode.png";
            link.click();
        }
    }
</script>

</body>
</html>
